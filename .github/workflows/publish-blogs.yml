name: Daily Blog Publisher

on:
  schedule:
    - cron: '0 7 * * *'     # 12:30 PM IST — primary run
    - cron: '30 7 * * *'    # 1:00 PM IST  — backup run (if primary skipped)
  workflow_dispatch:          # Manual trigger button in GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  publish-blogs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Check API key is set
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "ANTHROPIC_API_KEY secret is NOT set."
            exit 1
          else
            echo "ANTHROPIC_API_KEY is present."
          fi

      - name: Generate and publish 10 blogs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_blogs.py

      - name: Commit and push new blogs
        run: |
          git config user.name  "Blog Bot"
          git config user.email "bot@jayeshparab.com"
          git add blog/ sitemap.xml sitemap.html index.html
          git diff --cached --quiet || git commit -m "Daily blogs $(date +'%d %b %Y')"
          git push
